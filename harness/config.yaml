# stillwarm-bench harness configuration
# Source of truth for paths, disk budget, and (later) the model registry + ladder.
# Values marked TODO are filled in during the phase that produces them — never
# fabricated.

# --- Disk discipline --------------------------------------------------------
# 2026-07-04: measured free space ≈ 218 GB (below the earlier 250
# budget), so lowered to 180 to leave OS/swap headroom on the shared APFS container.
DISK_BUDGET_GB: 180

# --- Paths (relative to repo root unless absolute) -------------------------
paths:
  save_path: ./cache_saves/        # llama-server --slot-save-path target
  results: ./results/
  results_raw: ./results/raw/
  workloads: ./workloads/
  models_dir: ~/models/            # GGUF files live here (outside the repo)

# --- Pinned llama.cpp build ("pin everything") ------------------------------
# Full detail (build flags, --help) recorded at build time.
llamacpp:
  release_tag: b9871
  commit_sha: ef2d770117db45b05aa7ecd1b0acca36370c5470
  server_binary: TODO   # absolute path, filled after Release build succeeds

